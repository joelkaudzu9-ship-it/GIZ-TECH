<div class="product-card {% if product.is_sold %}sold{% endif %}"
     data-product-id="{{ product.id }}">

    <div class="card-image-container">
        <img src="{{ product.thumbnail or (product.image_list[0] if product.image_list else url_for('static', filename='images/placeholder.jpg')) }}"
             alt="{{ product.title }}"
             class="card-image"
             loading="lazy"
             onerror="this.src='{{ url_for('static', filename='images/placeholder.jpg') }}'">

        {% if product.is_sold %}
        <div class="sold-badge">
            <span>SOLD</span>
        </div>
        {% endif %}

        {% if product.is_featured %}
        <div class="featured-badge">
            <i class="fas fa-star"></i>
        </div>
        {% endif %}

        <div class="view-overlay">
            <i class="fas fa-eye"></i>
            <span>{{ product.views }} views</span>
        </div>
    </div>

    <div class="card-content">
        <h3 class="card-title">{{ product.title }}</h3>
        <p class="card-description">{{ product.description|truncate(100) }}</p>

        <div class="card-footer">
            <div class="price-section">
                <span class="price">MWK {{ "{:,.0f}".format(product.price) }}</span>
            </div>

            <a href="{{ url_for('main.product_detail', slug=product.slug or product.id) }}"
               class="btn-view">
                View Details
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>
</div>

<style>
.product-card {
    background: linear-gradient(145deg, rgba(20, 20, 30, 0.9), rgba(10, 10, 20, 0.95));
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 24px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
}

.product-card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: var(--accent-primary);
    box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.3);
}

.card-image-container {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
    background: linear-gradient(45deg, #1a1a2e, #16213e);
}

.card-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
}

.product-card:hover .card-image {
    transform: scale(1.1);
}

.sold-badge {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 600;
    z-index: 2;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
    animation: pulse 2s infinite;
}

.featured-badge {
    position: absolute;
    top: 1rem;
    left: 1rem;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    z-index: 2;
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    animation: spin 10s linear infinite;
}

.view-overlay {
    position: absolute;
    bottom: -50px;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
    color: white;
    padding: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: bottom 0.3s ease;
    z-index: 2;
}

.product-card:hover .view-overlay {
    bottom: 0;
}

.view-overlay i {
    color: var(--accent-primary);
}

.card-content {
    padding: 1.5rem;
    position: relative;
    z-index: 2;
}

.card-title {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text-light);
    transition: color 0.3s ease;
}

.product-card:hover .card-title {
    color: var(--accent-primary);
}

.card-description {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    line-height: 1.6;
}

.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 1rem;
}

.price {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent-primary);
}

.btn-view {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 50px;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-view:hover {
    background: var(--accent-primary);
    border-color: var(--accent-primary);
    transform: translateX(5px);
}

.btn-view i {
    font-size: 0.8rem;
    transition: transform 0.3s ease;
}

.btn-view:hover i {
    transform: translateX(3px);
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>

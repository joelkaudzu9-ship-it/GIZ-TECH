<!-- app/templates/components/modals/contact-modal.html -->
<div id="contactModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-container glass-effect">
        <div class="modal-header">
            <h3>Contact About <span id="modalProductTitle"></span></h3>
            <button class="modal-close" onclick="closeModal('contactModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="contactForm" class="modal-form">
            <input type="hidden" id="modalProductId" name="product_id">

            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text"
                       id="name"
                       name="name"
                       required
                       class="form-input"
                       placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       required
                       class="form-input"
                       placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message"
                          name="message"
                          required
                          class="form-input"
                          rows="4"
                          placeholder="I'm interested in this product..."></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('contactModal')">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary" id="submitMessage">
                    Send Message
                </button>
            </div>
        </form>
    </div>
</div>

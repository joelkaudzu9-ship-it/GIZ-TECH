# render.yaml
services:
  - type: web
    name: giz-tech
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers=2 --threads=4 --timeout=120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: giztech-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: giztech-cache
          property: connectionString
      - key: OWNER_PASSWORD
        sync: false  # Set manually in Render dashboard
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: giztech-db
    databaseName: giztech
    user: giztech_user
    plan: free  # Upgrade as needed

redis:
  - name: giztech-cache
    plan: free  # Upgrade as needed